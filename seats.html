<!DOCTYPE html>
<html>

<head>

<title>Select Seats</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
text-align:center;
}

.container{
width:400px;
margin:auto;
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

h2{
margin-bottom:10px;
}

.seat-grid{
display:grid;
grid-template-columns:repeat(4,60px);
gap:15px;
justify-content:center;
margin:20px 0;
}

.seat{
width:60px;
height:60px;
border:1px solid #ccc;
border-radius:8px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
}

.available{
background:white;
}

.selected{
background:#27ae60;
color:white;
}

.booked{
background:#e74c3c;
color:white;
cursor:not-allowed;
}

.female{
background:#ffb6c1;
}

.legend{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}

.legend div{
display:flex;
align-items:center;
gap:5px;
}

.box{
width:15px;
height:15px;
border-radius:3px;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#ff6b6b;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>


<div class="container">

<h2>Select Seats</h2>

<h3>Lower Deck</h3>

<div class="seat-grid" id="lowerDeck">

</div>


<h3>Upper Deck</h3>

<div class="seat-grid" id="upperDeck">

</div>


<h3>Total Price: ₹ <span id="price">0</span></h3>


<div class="legend">

<div><div class="box" style="background:white;border:1px solid #ccc"></div>Available</div>

<div><div class="box" style="background:#27ae60"></div>Selected</div>

<div><div class="box" style="background:#e74c3c"></div>Booked</div>

<div><div class="box" style="background:#ffb6c1"></div>Female</div>

</div>


<button onclick="nextPage()">Next</button>

</div>


<script>

let seatPrice = 800

let total = 0

let selectedSeats=[]


function createSeats(container,start,end){

for(let i=start;i<=end;i++){

let seat=document.createElement("div")

seat.classList.add("seat","available")

seat.innerHTML=i+"<br>₹"+seatPrice

seat.dataset.seat=i


/* female seats */

if(i==2||i==5){
seat.classList.add("female")
}


/* booked seats */

if(i==4||i==9){
seat.classList.remove("available")
seat.classList.add("booked")
}


seat.onclick=function(){

if(seat.classList.contains("booked")) return

if(seat.classList.contains("selected")){

seat.classList.remove("selected")
seat.classList.add("available")

total-=seatPrice
selectedSeats=selectedSeats.filter(s=>s!=i)

}else{

seat.classList.remove("available")
seat.classList.add("selected")

total+=seatPrice
selectedSeats.push(i)

}

document.getElementById("price").innerText=total

}

container.appendChild(seat)

}

}


createSeats(document.getElementById("lowerDeck"),1,16)

createSeats(document.getElementById("upperDeck"),17,32)



function nextPage(){

if(selectedSeats.length==0){

alert("Please select seat")

return

}

localStorage.setItem("selectedSeats",selectedSeats.join(","))

localStorage.setItem("totalAmount",total)

window.location="passenger.html"

}

</script>

</body>
</html>
