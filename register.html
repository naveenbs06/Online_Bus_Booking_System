<!DOCTYPE html>
<html>

<head>

<title>User Register</title>

<style>

body{

margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1f3c88,#4facfe);
font-family:Arial;

}

/* REGISTER CARD */

.register-box{

background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;

}

.register-box h2{

margin-bottom:25px;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:5px;

}

button{

width:100%;
padding:12px;
background:#ff4d4d;
border:none;
color:white;
border-radius:5px;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#e63e3e;

}

.login-link{

margin-top:15px;
font-size:14px;

}

.login-link a{

color:#ff4d4d;
text-decoration:none;

}

</style>

</head>



<body>



<div class="register-box">

<h2>User Register</h2>

<input type="text" placeholder="Enter Name">

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button>Register</button>

<div class="login-link">

Already have account?

<a href="login.html">Login</a>

</div>

</div>



</body>

</html>
