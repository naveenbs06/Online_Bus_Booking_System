<!DOCTYPE html>
<html>
<head>

<title>Available Buses</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
}

.container{
width:800px;
margin:auto;
padding:30px;
}

.route{
font-size:28px;
font-weight:bold;
}

.date{
color:gray;
margin-bottom:20px;
}

.filters{
margin-bottom:20px;
}

.filter-btn{
padding:10px 20px;
border-radius:20px;
border:1px solid #ccc;
background:white;
margin-right:10px;
cursor:pointer;
}

.bus-card{
background:white;
border-radius:10px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.bus-number{
background:#f5c04e;
display:inline-block;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
margin-bottom:10px;
}

.price{
float:right;
font-size:20px;
font-weight:bold;
}

.select-btn{
width:100%;
background:#ff6b6b;
border:none;
color:white;
padding:12px;
margin-top:15px;
border-radius:5px;
cursor:pointer;
}

.map-box{
margin-top:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="route" id="routeText"></div>
<div class="date" id="journeyDate"></div>

<div class="filters">
<button class="filter-btn">Filter & Sort</button>
<button class="filter-btn">⭐ Primo Bus</button>
<button class="filter-btn">💰 Deals</button>
</div>

<div id="busList"></div>


<!-- GOOGLE MAP -->

<div class="map-box">

<h3>Destination Location</h3>

<iframe
id="mapFrame"
width="100%"
height="300"
style="border:0"
loading="lazy"
allowfullscreen>
</iframe>

</div>

</div>


<script>

let from = localStorage.getItem("from")
let to = localStorage.getItem("to")
let date = localStorage.getItem("date")

if(!from || !to){
from="Unknown"
to="Unknown"
}

document.getElementById("routeText").innerHTML =
from + " → " + to

document.getElementById("journeyDate").innerHTML =
"Journey Date : " + date


/* GOOGLE MAP */

let map=document.getElementById("mapFrame")

map.src="https://www.google.com/maps?q="+to+"&output=embed"


let buses=[

{
number:"KA51AM5454",
name:"Go Tour Travels and Holidays",
time:"19:35 → 08:00",
seats:14,
price:848
},

{
number:"NL01B1375",
name:"GreenLine Travels",
time:"21:15 → 06:30",
seats:7,
price:833
},

{
number:"KA09B4455",
name:"VRL Travels",
time:"18:30 → 05:00",
seats:12,
price:750
}

]


function renderBuses(){

let html=""

buses.forEach(bus=>{

html+=`

<div class="bus-card">

<div class="bus-number">${bus.number}</div>

<div class="price">₹${bus.price}</div>

<h3>${bus.name}</h3>

<p>${bus.time}</p>

<p>${bus.seats} Seats Available</p>

<p>Scania AC Multi Axle Sleeper</p>

<button class="select-btn"
onclick="selectSeat(${bus.price})">

Select Seat

</button>

</div>

`

})

document.getElementById("busList").innerHTML=html

}

renderBuses()


function selectSeat(price){

localStorage.setItem("seatPrice",price)

window.location="seats.html"

}

</script>

</body>
</html>
